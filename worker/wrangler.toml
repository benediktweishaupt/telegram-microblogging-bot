name = "telegram-microblogging-bot"
main = "src/index.ts"
compatibility_date = "2026-03-01"

[[kv_namespaces]]
binding = "MEDIA_GROUPS"
id = "<KV_NAMESPACE_ID>"
preview_id = "<PREVIEW_ID>"

[vars]
GITHUB_REPO = "benediktweishaupt/telegram-microblogging-bot"

# Secrets (set via `wrangler secret put`):
# TELEGRAM_BOT_TOKEN
# TELEGRAM_WEBHOOK_SECRET
# GITHUB_TOKEN
# BENE_TELEGRAM_ID
# SANDRA_TELEGRAM_ID
